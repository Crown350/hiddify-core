name: Build mipsel_24kc (softfloat)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 4.1.0 or v4.1.0)'
        required: true
        default: '4.1.0'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mipsel-24kc:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize version tag
        id: tag
        run: |
          VER="${{ inputs.version }}"
          # Автоматически подставляем 'v', если юзер ввёл просто цифры
          if [[ "$VER" != v* ]]; then
            VER="v$VER"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          # КРИТИЧЕСКИ ВАЖНО: берем стабильный код релиза, а не сломанную ветку main
          ref: ${{ steps.tag.outputs.version }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Force-sync submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Download Go modules
        run: go mod download

      - name: Set build tags
        run: |
          TAGS='with_v2ray_api,with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale,with_ccm,with_ocm,tfogo_checklinkname0'
          echo "BUILD_TAGS=${TAGS}" >> "$GITHUB_ENV"

      - name: Build (mipsle, softfloat)
        run: |
          mkdir -p dist
          go build -v -trimpath \
            -o dist/hiddify-core \
            -tags "${BUILD_TAGS}" \
            -ldflags "-s -buildid= -X internal/godebug.defaultGODEBUG=multipathtcp=0 -checklinkname=0" \
            ./cmd/main/
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: mipsle
          GOMIPS: softfloat

      - run: chmod +x dist/hiddify-core

      - name: Verify ELF target
        run: |
          set -euo pipefail
          test -s dist/hiddify-core
          file dist/hiddify-core
          readelf -h dist/hiddify-core | grep -E 'Machine:[[:space:]]+MIPS'

      - name: Install packaging tools
        run: |
          sudo gem install fpm
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Set package version
        run: |
          APK_PKG_VERSION="${{ steps.tag.outputs.version }}"
          APK_PKG_VERSION="${APK_PKG_VERSION#v}"
          APK_PKG_VERSION="${APK_PKG_VERSION%%-*}"
          echo "APK_PKG_VERSION=${APK_PKG_VERSION}" >> "$GITHUB_ENV"

      - name: Build IPK package (mipsel_24kc)
        run: |
          set -xeuo pipefail
          cp .fpm_openwrt .fpm
          fpm -t deb \
            -v "$APK_PKG_VERSION" \
            -p dist/openwrt.deb \
            --architecture all \
            dist/hiddify-core=/usr/bin/hiddify-core
          hiddify-sing-box/.github/deb2ipk.sh \
            "mipsel_24kc" dist/openwrt.deb "dist/hiddify-core_mipsel_24kc.ipk"
          rm dist/openwrt.deb

      - uses: actions/upload-artifact@v4
        with:
          name: hiddify-core-mipsel_24kc-ipk
          path: dist/hiddify-core_mipsel_24kc.ipk
          retention-days: 7
