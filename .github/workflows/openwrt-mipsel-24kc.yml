name: Build mipsel_24kc (softfloat)

# Builds a hiddify-core .ipk for OpenWrt devices on the mipsel_24kc
# architecture (MIPS 24Kc CPU WITHOUT hardware FPU), e.g. MediaTek MT7621
# routers like the TP-Link Archer C6U.
#
# The official OpenWRT Release workflow only builds the hardfloat variant
# (mipsel_24kc_24kf / GOMIPS=hardfloat), which crashes with
# "Illegal instruction" on FPU-less 24Kc CPUs. This builds the softfloat
# (GOMIPS=softfloat) variant and uploads it as an artifact.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (digits only, e.g. 4.1.0)'
        required: false
        default: '4.1.0'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mipsel-24kc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Build from the release tag matching the requested package version,
          # same strategy as upstream OpenWRT workflow_dispatch.
          ref: ${{ startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version) }}
          submodules: 'recursive'
          fetch-depth: 0

      # Ensure submodules (notably hiddify-sing-box) are checked out at the
      # exact pinned commits. Without this the build fails with errors like
      # "does not implement Config (missing method HandshakeTimeout)".
      - name: Force-sync submodules
        run: |
          set -xeuo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --force
          echo "---- submodule status ----"
          git submodule status --recursive
          echo "---- sanity check ----"
          test -f hiddify-sing-box/go.mod && echo "hiddify-sing-box present"
          test -f hiddify-sing-box/.github/deb2ipk.sh && echo "deb2ipk.sh present"

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Download Go modules
        run: go mod download

      - name: Set build tags
        run: |
          TAGS='with_v2ray_api,with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale,with_ccm,with_ocm,tfogo_checklinkname0'
          echo "BUILD_TAGS=${TAGS}" >> "$GITHUB_ENV"

      - name: Build (mipsle, softfloat)
        run: |
          mkdir -p dist
          go build -v -trimpath \
            -o dist/hiddify-core \
            -tags "${BUILD_TAGS}" \
            -ldflags "-s -buildid= -X internal/godebug.defaultGODEBUG=multipathtcp=0 -checklinkname=0" \
            ./cmd/main/
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: mipsle
          GOMIPS: softfloat

      - run: chmod +x dist/hiddify-core

      - name: Verify ELF target
        run: |
          set -euo pipefail
          test -s dist/hiddify-core
          file dist/hiddify-core
          file dist/hiddify-core | grep -E 'ELF 32-bit.*MIPS'
          readelf -h dist/hiddify-core | grep -E 'Machine:[[:space:]]+MIPS'
          readelf -h dist/hiddify-core | grep -E "Data:[[:space:]]+2's complement, little endian"

      - name: Install packaging tools
        run: |
          sudo gem install fpm
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Set package version
        run: |
          APK_PKG_VERSION="${{ inputs.version }}"
          APK_PKG_VERSION="${APK_PKG_VERSION#v}"
          APK_PKG_VERSION="${APK_PKG_VERSION%%-*}"
          echo "APK_PKG_VERSION=${APK_PKG_VERSION}" >> "$GITHUB_ENV"

      - name: Build IPK package (mipsel_24kc)
        run: |
          set -xeuo pipefail
          cp .fpm_openwrt .fpm
          fpm -t deb \
            -v "$APK_PKG_VERSION" \
            -p dist/openwrt.deb \
            --architecture all \
            dist/hiddify-core=/usr/bin/hiddify-core
          hiddify-sing-box/.github/deb2ipk.sh \
            "mipsel_24kc" dist/openwrt.deb "dist/hiddify-core_mipsel_24kc.ipk"
          rm dist/openwrt.deb
          ls -lh dist/

      - name: Verify IPK artifact
        run: |
          set -euo pipefail
          test -s dist/hiddify-core_mipsel_24kc.ipk
          file dist/hiddify-core_mipsel_24kc.ipk
          ar t dist/hiddify-core_mipsel_24kc.ipk | grep -E '^control\\.tar\\.gz$'
          ar t dist/hiddify-core_mipsel_24kc.ipk | grep -E '^data\\.tar\\.gz$'

      - uses: actions/upload-artifact@v7
        with:
          name: hiddify-core-mipsel_24kc-ipk
          path: dist/hiddify-core_mipsel_24kc.ipk
          retention-days: 7
